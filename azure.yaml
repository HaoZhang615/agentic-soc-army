# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: agentic-soc-army
metadata:
  template: agentic-soc-army

infra:
  provider: bicep
  path: infra
  module: main

hooks:
  postprovision:
    posix:
      shell: sh
      run: infra/postprovision.sh
    windows:
      shell: pwsh
      run: infra/postprovision.ps1
